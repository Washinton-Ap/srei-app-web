spring.application.name=srei

server.port=8080

# PostgreSQL (ajusta si tu credencial cambia)
spring.datasource.url=jdbc:postgresql://localhost:5432/bdsreiwdaux
spring.datasource.username=postgres
spring.datasource.password=123456

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# Tamaño de subida
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# JWT
app.jwt.secret=CAMBIA_ESTA_CLAVE_LARGA_PARA_PRODUCCION_1234567890_CAMBIA
app.jwt.expiration-minutes=720

# CORS
app.cors.allowed-origin=http://localhost:4200
